<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Cartridge Master</title>
    <link rel="icon" type="image/x-icon" href="../static/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <div class="login-brand">
                <img src="../static/billy.png" alt="Billy" class="login-brand-photo">
                <div class="login-brand-text">
                    <h1>Cartridge Master</h1>
                    <p>Войдите в систему</p>
                </div>
            </div>
            
            <div class="auth-tabs">
                <button type="button" class="tab-btn active" onclick="switchAuthTab('ldap')">Домен</button>
                <button type="button" class="tab-btn" onclick="switchAuthTab('local')">Локально</button>
            </div>
            
            <form id="loginForm">
                <input type="hidden" id="authType" name="auth_type" value="ldap">
                
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Войти</button>
            </form>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
